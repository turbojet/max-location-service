name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bonial_locations
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bonial_locations"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5435/bonial_locations
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5435/bonial_locations_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5435 -U postgres -d postgres \
            -c "CREATE DATABASE bonial_locations_test"

      - name: Apply migrations (dev)
        run: npx prisma migrate deploy

      - name: Apply migrations (test)
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
