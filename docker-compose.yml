services:
  postgres:
    image: postgres:16-alpine
    container_name: bonial-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bonial_locations
    ports:
      - '5435:5432'
    volumes:
      - bonial-postgres-data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bonial_locations']
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 30s

volumes:
  bonial-postgres-data:
